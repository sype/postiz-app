---
# Pipeline de build du fork multi-tenant (demoskp/postiz-app)
#
# À COMMITTER DANS LE FORK, en remplacement de :
#   .github/workflows/build-containers.yml
#
# Différences vs le workflow hérité d'upstream :
#   - Image repointée sur le namespace du fork (ghcr.io/<owner>/postiz-app)
#     au lieu de ghcr.io/gitroomhq/postiz-app (hardcodé, non poussable).
#   - amd64 uniquement (la prod Dedibox est amd64) -> build + simple + rapide,
#     plus besoin du job "manifest" multi-arch.
#   - Ajout de `permissions: packages: write` (requis pour que GITHUB_TOKEN
#     puisse pousser un package ghcr dans le namespace du repo).
#   - Pousse `:<tag>` ET `:latest` en une étape.
#
# Déclenchement : push d'un tag (ex. `v2.21.x-mt1`) ou lancement manuel.

name: "Build Containers (fork multi-tenant)"

on:
  workflow_dispatch:
  push:
    tags:
      - '*'

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/postiz-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push (amd64)
        env:
          NEXT_PUBLIC_VERSION: ${{ github.ref_name }}
        run: |
          docker buildx build --platform linux/amd64 \
            -f Dockerfile.dev \
            --build-arg NEXT_PUBLIC_VERSION="${NEXT_PUBLIC_VERSION}" \
            --pull --no-cache \
            --provenance=false --sbom=false \
            -t "${IMAGE}:${{ github.ref_name }}" \
            -t "${IMAGE}:latest" \
            --output "type=registry" .

      - name: Résumé
        run: |
          echo "Image poussée :"
          echo "  ${IMAGE}:${{ github.ref_name }}"
          echo "  ${IMAGE}:latest"
          echo ""
          echo "Pour déployer en prod, utiliser le tag PINNÉ (pas :latest) :"
          echo "  ${IMAGE}:${{ github.ref_name }}"
